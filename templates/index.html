{% extends "base.html" %}

{% block content %}
<section class="py-2">
    <h1 class="h3 mb-3">EasySplit</h1>
    <p class="text-muted mb-4">Divisão simples de despesas em grupo.</p>

    {% if current_user.is_authenticated %}
        <p class="mb-3">Olá, {{ current_user.nome }}.</p>
        <a class="btn btn-primary" href="{{ url_for('groups.index') }}">Ir para grupos</a>
    {% else %}
        <div class="d-flex gap-2">
            <a class="btn btn-primary" href="{{ url_for('auth.login') }}">Entrar</a>
            <a class="btn btn-outline-primary" href="{{ url_for('auth.register') }}">Criar conta</a>
        </div>
    {% endif %}
</section>
{% endblock %}
